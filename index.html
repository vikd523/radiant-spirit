<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎴</text></svg>" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PokeSphere — Pokémon Pack Simulator</title>
  <meta name="description"
    content="High-fidelity Pokémon TCG pack opening simulator with realistic pull rates and cinematic reveals." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&display=swap"
    rel="stylesheet" />
  <script type="module" src="https://unpkg.com/@splinetool/viewer/build/spline-viewer.js"></script>
  <link rel="preload" href="https://prod.spline.design/NoIfSkVO2P9kDRDU/scene.splinecode" as="fetch" crossorigin />
</head>

<body>
  <!-- Persistent Spline container so it never reloads on app state change -->
  <div id="spline-persistent-container" class="spline-widget-container">
    <spline-viewer url="https://prod.spline.design/NoIfSkVO2P9kDRDU/scene.splinecode"
      background="transparent"></spline-viewer>
  </div>

  <div id="app"></div>
  <div id="three-canvas-container"></div>
  <script type="module" src="/src/main.ts"></script>

  <!-- Script to block zoom and remove "Built with Spline" watermark -->
  <script>
    (function () {
      // 1) Block scroll-wheel zoom on the Spline container
      var container = document.getElementById('spline-persistent-container');
      if (container) {
        container.addEventListener('wheel', function (e) {
          e.preventDefault();
          e.stopPropagation();
        }, { passive: false, capture: true });
      }

      // 2) Remove the "Built with Spline" watermark from the shadow DOM
      function removeSplineLogo() {
        var viewer = document.querySelector('spline-viewer');
        if (!viewer || !viewer.shadowRoot) return false;
        var root = viewer.shadowRoot;
        var removed = false;

        // Strategy A: Find by ID
        var logo = root.getElementById('logo');
        if (logo) { logo.remove(); removed = true; }

        // Strategy B: Find any <a> tag linking to spline.design
        var anchors = root.querySelectorAll('a');
        anchors.forEach(function (a) {
          var href = a.getAttribute('href') || '';
          if (href.indexOf('spline') !== -1) {
            a.remove();
            removed = true;
          }
        });

        // Strategy C: Find any element with "Built with" text
        var textEls = root.querySelectorAll('div, span, a, p');
        textEls.forEach(function (el) {
          var txt = el.textContent || '';
          if (txt.indexOf('Built with') !== -1 || txt.indexOf('built with') !== -1) {
            el.remove();
            removed = true;
          }
        });

        // Strategy D: Inject CSS to hide anything we might have missed
        if (!root.querySelector('#hide-spline-logo')) {
          var s = document.createElement('style');
          s.id = 'hide-spline-logo';
          s.textContent = [
            '#logo { display:none!important; }',
            'a[href*="spline"] { display:none!important; }',
            'div[style*="bottom"] a { display:none!important; }'
          ].join('\n');
          root.appendChild(s);
          removed = true;
        }

        return removed;
      }

      // Poll every 500ms for 30 seconds
      var attempts = 0;
      var interval = setInterval(function () {
        attempts++;
        if (removeSplineLogo() || attempts >= 60) {
          clearInterval(interval);
        }
      }, 500);

      // Also observe shadow root mutations once the element is defined
      if (window.customElements) {
        customElements.whenDefined('spline-viewer').then(function () {
          var viewer = document.querySelector('spline-viewer');
          if (viewer && viewer.shadowRoot) {
            new MutationObserver(function () { removeSplineLogo(); })
              .observe(viewer.shadowRoot, { childList: true, subtree: true });
            removeSplineLogo();
          }
        }).catch(function () { });
      }
    })();
  </script>
</body>

</html>
