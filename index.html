<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎴</text></svg>" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PokeSphere — Pokémon Pack Simulator</title>
  <meta name="description"
    content="High-fidelity Pokémon TCG pack opening simulator with realistic pull rates and cinematic reveals." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&display=swap"
    rel="stylesheet" />
</head>

<body>
  <!-- Persistent Spline container — iframe embed for cross-browser reliability -->
  <div id="spline-persistent-container" class="spline-widget-container">
    <iframe id="spline-iframe" src="https://my.spline.design/NoIfSkVO2P9kDRDU/" frameborder="0" allowfullscreen
      allow="autoplay" loading="eager" style="width:100%; height:100%; border:none; pointer-events:auto;"></iframe>
    <!-- Fallback if iframe fails to load -->
    <div id="spline-fallback"
      style="display:none; width:100%; height:100%; align-items:center; justify-content:center;">
      <span style="font-size:5rem; filter:drop-shadow(0 0 20px rgba(128,0,255,0.6));">👻</span>
    </div>
  </div>

  <div id="app"></div>
  <div id="three-canvas-container"></div>
  <script type="module" src="/src/main.ts"></script>

  <!-- Spline iframe fallback + scroll block -->
  <script>
    (function () {
      var iframe = document.getElementById('spline-iframe');
      var fallback = document.getElementById('spline-fallback');
      var loaded = false;

      if (iframe) {
        iframe.addEventListener('load', function () { loaded = true; });
      }

      // Block scroll-wheel zoom on the Spline container
      var container = document.getElementById('spline-persistent-container');
      if (container) {
        container.addEventListener('wheel', function (e) {
          e.preventDefault();
          e.stopPropagation();
        }, { passive: false, capture: true });
      }

      // Fallback: if iframe doesn't load in 8 seconds, show static emoji
      setTimeout(function () {
        if (!loaded && iframe && fallback) {
          iframe.style.display = 'none';
          fallback.style.display = 'flex';
        }
      }, 8000);
    })();
  </script>
</body>

</html>
