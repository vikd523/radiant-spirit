<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎴</text></svg>" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PokeSphere — Pokémon Pack Simulator</title>
  <meta name="description"
    content="High-fidelity Pokémon TCG pack opening simulator with realistic pull rates and cinematic reveals." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&display=swap"
    rel="stylesheet" />
  <script type="module" src="https://unpkg.com/@splinetool/viewer/build/spline-viewer.js"></script>
  <link rel="preload" href="https://prod.spline.design/NoIfSkVO2P9kDRDU/scene.splinecode" as="fetch" crossorigin />
</head>

<body>
  <!-- Persistent Spline container so it never reloads on app state change -->
  <div id="spline-persistent-container" class="spline-widget-container">
    <spline-viewer url="https://prod.spline.design/NoIfSkVO2P9kDRDU/scene.splinecode"
      background="transparent"></spline-viewer>
  </div>

  <div id="app"></div>
  <div id="three-canvas-container"></div>
  <script type="module" src="/src/main.ts"></script>

  <!-- Script to block zoom and remove "Built with Spline" watermark -->
  <script>
    (function () {
      // 1) Block scroll-wheel zoom on the Spline container
      const container = document.getElementById('spline-persistent-container');
      if (container) {
        container.addEventListener('wheel', function (e) {
          e.preventDefault();
          e.stopPropagation();
        }, { passive: false, capture: true });
      }

      // 2) Aggressively find and hide the "Built with Spline" logo
      //    The logo lives inside spline-viewer's shadow DOM as an <a> or <div> with the Spline branding.
      function removeSplineLogo() {
        const viewer = document.querySelector('spline-viewer');
        if (!viewer || !viewer.shadowRoot) return false;

        // The logo is typically an anchor tag with id="logo" or a div containing "Built with Spline"
        const logo = viewer.shadowRoot.getElementById('logo');
        if (logo) {
          logo.remove();
          return true;
        }

        // Fallback: find any element containing the text "Built with Spline" or "Spline" branding
        const allElements = viewer.shadowRoot.querySelectorAll('a, div, span, img');
        for (const el of allElements) {
          if (el.textContent && el.textContent.includes('Built with')) {
            el.remove();
            return true;
          }
          // Also check for the Spline logo image
          if (el.tagName === 'IMG' && el.src && el.src.includes('spline')) {
            el.parentElement.remove();
            return true;
          }
        }
        return false;
      }

      // Try immediately, then poll every 500ms until found (Spline loads async)
      let attempts = 0;
      const maxAttempts = 30; // Try for 15 seconds
      const interval = setInterval(function () {
        attempts++;
        if (removeSplineLogo() || attempts >= maxAttempts) {
          clearInterval(interval);
        }
      }, 500);

      // Also use MutationObserver on the spline-viewer for extra safety
      const observer = new MutationObserver(function () {
        removeSplineLogo();
      });

      // Wait for spline-viewer to be defined, then observe its shadow root
      customElements.whenDefined('spline-viewer').then(function () {
        const viewer = document.querySelector('spline-viewer');
        if (viewer && viewer.shadowRoot) {
          observer.observe(viewer.shadowRoot, { childList: true, subtree: true });
          removeSplineLogo(); // Try once immediately
        }
      }).catch(function () { });
    })();
  </script>
</body>

</html>
